<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRIKE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#d4c5a9;font-family:Georgia,serif;overflow:hidden;width:100vw;height:100vh;cursor:pointer}
#title{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:#0a0a0f}
#title h1{font-size:4rem;color:#c9a84c;letter-spacing:.3em;margin-bottom:.2em}
#title h2{font-size:1.5rem;color:#8a7a5a;letter-spacing:.4em;margin-bottom:3em}
.mbtn{display:block;background:none;border:1px solid rgba(201,168,76,.35);color:#c9a84c;font-size:1.1rem;padding:.8em 3em;margin:.5em auto;cursor:pointer;letter-spacing:.1em;min-width:220px;transition:background .2s}
.mbtn:hover{background:rgba(201,168,76,.12)}
#game{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:flex-end;padding:60px 0}
#bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:-1;transition:background 1.5s}
#box{max-width:780px;margin:0 auto;padding:0 40px;width:100%}
#spk{font-size:.85rem;color:#c9a84c;letter-spacing:.15em;min-height:1.4em;margin-bottom:.5em}
#txt{font-size:1.05rem;line-height:2;min-height:100px;letter-spacing:.05em}
.narrator{color:#9a8a6a;font-style:italic}
.dialogue{color:#e8dcc8}
.lyrics{color:#8a7a5a;font-style:italic}
.francis-voice{color:#b8a0d4}
.arthur-voice{color:#a8c47a}
.ivan-voice{color:#7ab8c4}
#hint{position:fixed;bottom:20px;right:30px;color:rgba(201,168,76,.35);font-size:.75rem;animation:p 2s ease infinite}
@keyframes p{0%,100%{opacity:.3}50%{opacity:.8}}
#choices{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;gap:14px;z-index:20}
.cbtn{background:rgba(10,10,15,.9);border:1px solid rgba(201,168,76,.3);color:#d4c5a9;font-size:1rem;padding:.9em 2.5em;cursor:pointer;min-width:280px;text-align:center;transition:all .3s;letter-spacing:.08em}
.cbtn:hover{background:rgba(201,168,76,.12);border-color:#c9a84c;color:#c9a84c}
#vignette{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.65) 100%)}
#rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;transition:opacity 1s;z-index:1}
.rd{position:absolute;width:1px;background:linear-gradient(transparent,rgba(174,194,224,.45));animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-100vh)}100%{transform:translateY(100vh)}}
#fade{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0f;pointer-events:none;opacity:0;transition:opacity .6s;z-index:5}
#chov{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0f;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:30;opacity:0;transition:opacity 1.2s}
#chov h1{font-size:2.8rem;color:#c9a84c;letter-spacing:.3em}
#chov h2{font-size:1.3rem;color:#8a7a5a;margin-top:.5em;letter-spacing:.3em}
#chapsel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,15,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:25}
#chapsel h2{color:#c9a84c;font-size:1.3rem;margin-bottom:1.5em;letter-spacing:.2em}
.chbtn{background:none;border:1px solid rgba(201,168,76,.2);color:#d4c5a9;font-size:1rem;padding:.9em 2.5em;margin:.4em;cursor:pointer;width:300px;text-align:left;transition:all .3s}
.chbtn:hover{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.4)}
.chbtn span{display:block;font-size:.75rem;color:#8a7a5a;margin-top:.2em}
#hud{position:fixed;top:12px;right:16px;z-index:20;display:none;gap:8px}
.hbtn{background:none;border:none;color:rgba(201,168,76,.4);font-size:.75rem;cursor:pointer;padding:4px 8px;transition:color .3s}
.hbtn:hover{color:#c9a84c}
</style>
</head>
<body>
<div id="rain"></div>
<div id="vignette"></div>
<div id="fade"></div>
<div id="chov"><h1 id="cen"></h1><h2 id="czh"></h2></div>

<div id="title">
  <h1>STRIKE</h1>
  <h2>引燃</h2>
  <button class="mbtn" onclick="startGame()">开始游戏</button>
  <button class="mbtn" onclick="openChapSel()">章节选择</button>
  <button class="mbtn" onclick="loadGame()">继续游戏</button>
</div>

<div id="chapsel">
  <h2>CHAPTERS</h2>
  <button class="chbtn" onclick="jumpCh(0)">第一章 · 引燃<span>Strike</span></button>
  <button class="chbtn" onclick="jumpCh(1)">第二章 · 炽烧<span>Conflagration</span></button>
  <button class="chbtn" onclick="jumpCh(2)">第三章 · 余烬<span>Ashes</span></button>
  <button class="chbtn" onclick="jumpCh(3)">终章<span>Finale</span></button>
  <button class="chbtn" onclick="closeChapSel()" style="color:#5a5040;border-color:rgba(201,168,76,.1);margin-top:.8em">返回</button>
</div>

<div id="game">
  <div id="bg"></div>
  <div id="box">
    <div id="spk"></div>
    <div id="txt"></div>
  </div>
</div>
<div id="choices"></div>
<div id="hint">点击继续 ▸</div>
<div id="hud">
  <button class="hbtn" onclick="saveGame()">存档</button>
  <button class="hbtn" onclick="openChapSel()">章节</button>
</div>

<script>
// ===== MINIMAL ENGINE =====
let cur = 0, typing = false, timer = null, scenes = [], started = false;
const state = {};

const $ = id => document.getElementById(id);

// Rain
(function(){
  const r = $('rain');
  for(let i=0;i<60;i++){
    const d=document.createElement('div');d.className='rd';
    d.style.left=Math.random()*100+'%';d.style.height=(8+Math.random()*18)+'px';
    d.style.animationDuration=(0.4+Math.random()*.6)+'s';d.style.animationDelay=Math.random()*2+'s';
    d.style.opacity=0.15+Math.random()*.35;r.appendChild(d);
  }
})();

function setRain(on){ $('rain').style.opacity = on ? '.4' : '0'; }

function showScene(idx){
  if(idx<0||idx>=scenes.length) return;
  cur = idx;
  const s = scenes[idx];
  if(!s) return;

  if(s.rain===false) setRain(false); else setRain(true);
  if(s.bg) $('bg').style.background = s.bg;

  const spk = $('spk');
  spk.textContent = s.speaker||'';
  spk.className = s.speakerClass||'';

  const txt = $('txt');
  txt.className = s.textClass||'';
  txt.textContent = '';
  $('choices').style.display='none';
  $('hint').style.display = s.choices?'none':'block';

  const chars = (s.text||'').split('');
  let ci=0; typing=true;
  clearInterval(timer);
  timer = setInterval(()=>{
    if(ci<chars.length){ txt.textContent+=chars[ci++]; }
    else{ clearInterval(timer); typing=false; if(s.choices) showChoices(s.choices); }
  }, 28);
}

function skipType(){
  if(!typing) return false;
  clearInterval(timer); typing=false;
  const s=scenes[cur];
  $('txt').textContent = s.text||'';
  if(s.choices) showChoices(s.choices);
  return true;
}

function advance(){
  if(!started) return;
  if($('chapsel').style.display==='flex') return;
  if($('choices').style.display==='flex') return;
  if(skipType()) return;
  const s=scenes[cur];
  const next = (s&&s.next!==undefined) ? s.next : cur+1;
  doTransition(next);
}

function doTransition(idx){
  const s = scenes[idx];
  if(s&&s.chapterTitle){
    showChTitle(s.chapterTitle.en, s.chapterTitle.zh, ()=>showScene(idx));
    return;
  }
  const fade=$('fade');
  fade.style.opacity='1';
  setTimeout(()=>{ showScene(idx); setTimeout(()=>{ fade.style.opacity='0'; },50); },650);
}

function showChoices(choices){
  const el=$('choices'); el.innerHTML=''; el.style.display='flex';
  $('hint').style.display='none';
  choices.forEach(c=>{
    const b=document.createElement('button'); b.className='cbtn'; b.textContent=c.text;
    b.onclick=()=>{ el.style.display='none'; if(c.flag) state[c.flag]=c.value; doTransition(c.next); };
    el.appendChild(b);
  });
}

function showChTitle(en,zh,cb){
  const ov=$('chov');
  $('cen').textContent=en; $('czh').textContent=zh;
  ov.style.display='flex';
  setTimeout(()=>ov.style.opacity='1',50);
  setTimeout(()=>{ ov.style.opacity='0'; setTimeout(()=>{ ov.style.display='none'; cb(); },1300); },3000);
}

function startGame(){ launchFrom(0); }
function loadGame(){
  const d=localStorage.getItem('strike_save');
  if(!d){alert('没有存档');return;}
  const p=JSON.parse(d); Object.assign(state,p.state||{}); launchFrom(p.cur||0);
}
function saveGame(){ localStorage.setItem('strike_save',JSON.stringify({cur,state})); }
function openChapSel(){ $('chapsel').style.display='flex'; }
function closeChapSel(){ $('chapsel').style.display='none'; }
const chStarts=[0,73,193,304];
function jumpCh(c){ closeChapSel(); launchFrom(chStarts[c]); }

function launchFrom(idx){
  $('title').style.display='none';
  $('game').style.display='flex';
  $('hud').style.display='flex';
  setTimeout(() => { started = true; }, 50); // 防点击冒泡
  doTransition(idx);
}

document.addEventListener('click', e=>{
  if(!started) return;
  if(e.target.closest('button')) return;
  advance();
});
document.addEventListener('keydown', e=>{
  if(!started) return;
  if(['Space','Enter','ArrowRight'].includes(e.code)){ e.preventDefault(); advance(); }
});

const S=(text,opts={})=>({text,...opts});
scenes=[
// ========== CHAPTER 1: IGNITION ==========
// 0
S("媒体将这一年称为\"预兆之年\"。就像日全食前的风，街头的一切都在慢慢变凉，直到天黑到像是太阳一去不回。", {
  bg: 'linear-gradient(180deg, #0a0a12 0%, #12121f 100%)',
  rain: true, letterbox: true, textClass: 'narrator',
  chapterTitle: { en: 'STRIKE', zh: '引燃' }
}),
// 1
S("1992年春，洛杉矶陷入骚乱，火焰在电视屏幕的边缘蔓延；曼联在足总杯中输给诺丁汉森林，球迷在酒吧里摔碎了酒瓶；查尔斯王子宣布与戴安娜分居，精心美化的皇室童话正式宣告破产；苏联的尸体还没凉透，东欧间谍网络却已经在布拉格重组。", {
  textClass: 'narrator'
}),
// 2
S("三月的一天，葡萄牙外交部一位年轻官员的尸体出现在泰晤士河畔。他的死讯被简短掩埋在《卫报》第13版，头版还在讨论克林顿的性丑闻和东区新开的唐顿百货。", {
  textClass: 'narrator'
}),
// 3
S("伦敦没什么不同，天总是湿的，报纸也总是湿的，整座城市潮湿得发霉。苏活区的霓虹灯下，醉汉、妓女与神职人员共用一条街道，落魄歌手在深夜电台中哼着不知所谓的歌，夜晚漫长而沉闷。", {
  textClass: 'narrator'
}),
// 4
S("于是，人们开始期待一场爆炸，或至少一件能让他们记住当下的事情。不是因为愤怒，也不仅仅出于欲望。或许在走投无路之时，这是把世界从梦游中唤醒的唯一方式。", {
  textClass: 'narrator'
}),
// 5
S("傍晚七点，苏活区洲际酒店的行政套房内，落地窗外是一排整洁的滴水轨迹，城市灰白得像张尚未润色的底片。", {
  bg: 'linear-gradient(180deg, #0f0e14 0%, #1a1520 100%)'
}),
// 6
S("弗朗西斯·波诺弗瓦瞥了一眼穿衣镜中的自己：赤身裸体，在昏黄的灯光中抽着烟，他靠在床头柔软的靠枕中，金发散乱挡住了眼睛，薄毯搭在他的腿上，没有完全遮住，另一半已经垂在了地上。电话听筒放在枕边，贴着他的肩膀。", {}),
// 7
S("荷兰的影子基金正在控股。家族目前占比百分之四十七，我会让他们满意。", {
  speaker: '弗朗西斯', speakerClass: 'francis-voice', textClass: 'dialogue'
}),
// 8
S("你做得太顺了，弗朗西斯。家族不是怀疑你，我们只是提醒你——你拥有的一切，都是家族的。", {
  speaker: '舅舅', textClass: 'dialogue'
}),
// 9
S("我当然记得。我母亲最近怎么样？", {
  speaker: '弗朗西斯', speakerClass: 'francis-voice', textClass: 'dialogue'
}),
// 10
S("还好。大多数时候都一言不发，我们请了最好的人照顾她，但听到你的消息时，她心情还不错。", {
  speaker: '舅舅', textClass: 'dialogue'
}),
// 11
S("我从来不会让她失望。", {
  speaker: '弗朗西斯', speakerClass: 'francis-voice', textClass: 'dialogue'
}),
// 12
S("你首先该做的，是不让我们失望。", {
  speaker: '舅舅', textClass: 'dialogue'
}),
// 13
S("那就是我一生的追求。我对家族始终心怀感恩。", {
  speaker: '弗朗西斯', speakerClass: 'francis-voice', textClass: 'dialogue'
}),
// 14
S("他挂断电话时窗外的雨还在下，但室内忽然安静得有些突兀。他起身，走过客厅，脚步声在地毯上毫无声响。他拐过玄关角落，拉开浴室门，空气中突然弥漫起一种血液的金属气息——尽管消毒水和酒店高级香薰的味道在竭力掩盖，那股腥气却仍穿透而出。", {
  bg: 'linear-gradient(180deg, #12080a 0%, #1a0f12 100%)'
}),
// 15
S("浴缸里什么都没有了，只剩一些细小的溅落痕迹，尚未擦净。地板上，一只断裂的袖扣滚落在排水口边缘，另一只或许还插在那件被扯破的西装上。", {}),
// 16
S("那件西装佩德罗穿并不好看，弗朗西斯想，但对于那样出众的容貌而言，这样的评价几乎像是苛责。葡萄牙人有一张被阳光吻过的脸，深棕色的头发，杏核状小鹿一样的眼眸，眼角下方缀着一颗泪痣。", {
  textClass: 'narrator'
}),
// 17
S("弗朗西斯记得他厨艺很好，甜品手艺几乎快要胜过自己。冰箱里还装着那盒蛋挞，是他初次拜访时带来的礼物。他们约会了三个月，或许对方以为这一次拜访能将他们的关系更进一步。", {
  textClass: 'narrator'
}),
// 18
S("弗朗西斯原本想给他一个干净利落的死法，蛋挞下一层的位置摆着一支注射器，预示着对方的命运。波诺弗瓦家族对这种药物控制得很仔细，他的另一个舅舅声称教皇都会用它来安乐死。可惜对方挣扎得过于激烈，像遇上捕猎者的鹿，活得孤注一掷，死得狼狈不堪。", {
  textClass: 'narrator', heartbeat: true
}),
// 19
S("很快，他将对方的遗物收拾妥当，连同酒店房间内的一块镇纸包裹在一起，最后他捡起那枚袖扣，擦净，将它收入风衣内袋。", {
  heartbeat: false
}),
// 20
S("窗外街道上，一辆运货车驶过，洒水声将这城市彻底洗净。弗朗西斯慢条斯理地戴上皮手套，整了整领口，顺手将酒店的一次性火柴盒塞进口袋——上面印着：\"We Deliver Luxury Without Consequences\"", {}),
// 21
S("或许他今晚该在这里碰碰运气。", { textClass: 'narrator' }),
// 22 - Arthur intro
S("亚瑟·柯克兰把自己摔进巷子尽头时，鞋底正踩在一个水洼中，溅了一身积水，他却毫不在意，整个人滑坐在砖墙边。", {
  bg: 'linear-gradient(180deg, #0a0c12 0%, #0e1018 100%)'
}),
// 23
S("他的左眉角挂着血，衬衣被扯裂，手里还捏着个皱巴巴的烟盒。回过神后，他靠着墙喘气，鼻梁下的伤口还在出血，在雨中那双眼睛亮得惊人，与其说像是刚被酒吧赶出去，不如说更像是在牌桌上连赢三把。", {}),
// 24
S("事实上他确实赢了。半小时前，他全身湿透地踏进那家酒馆，点了一杯金汤力，在吧台前晃荡着杯子，似乎准备用上一整晚来把它喝光。", {}),
// 25
S("来一手最小注。", {
  speaker: '亚瑟', speakerClass: 'arthur-voice', textClass: 'dialogue'
}),
// 26
S("他把两枚二十镑筹码拍在投注区上，语气轻描淡写，仿佛根本不想引起注意。起初根本没人在意他——直到他连续赢了三局，筹码在他面前越堆越高，像是替他建起了一座小型纪念碑。", {}),
// 27
S("你他妈是不是出千！", {
  speaker: '赌徒', textClass: 'dialogue'
}),
// 28
S("我不过是动了动脑子。", {
  speaker: '亚瑟', speakerClass: 'arthur-voice', textClass: 'dialogue'
}),
// 29
S("用脑子也是作弊。", {
  speaker: '赌徒', textClass: 'dialogue'
}),
// 30
S("等我把你的脑子糊在墙上再说这话吧。", {
  speaker: '亚瑟', speakerClass: 'arthur-voice', textClass: 'dialogue'
}),
// 31
S("他承认自己确实醉了些。当他第一拳砸在对方脸上，混战瞬间爆发，酒精和肾上腺素把他整个人点燃。他在一片砸瓶子的声音中被按在桌上，再跌在地上，最后被拎着丢出了后门，跌进夜雨如注的巷子，带着一身污泥和血痕。", {
  sfx: 'glass', shake: true
}),
// 32
S("烟盒里还剩下最后一根，他翻遍了口袋也没找到打火机。雨越下越冷，他却把脑袋重新靠回墙壁，闭上眼，这样的时候他实在想不到还能上哪去。", {}),
// 33 - First meeting
S("终于，他听到了脚步声。那声音显然不属于这片穷街陋巷，即使踩过水洼也丝毫不显得狼狈。脚步声在他附近停下了，亚瑟听见一阵轻响，像是有什么被丢进了旁边的垃圾桶，然后是一声干脆的火柴划燃声。", {
  sfx: 'match',
  bg: 'linear-gradient(180deg, #0e0a08 0%, #1a1410 100%)'
}),
// 34
S("喂，有火吗？", {
  speaker: '亚瑟', speakerClass: 'arthur-voice', textClass: 'dialogue'
}),
// 35
S("对方愣了一下，显然没意识到他的存在。下一秒，一双穿皮鞋的脚步靠近了，他看到风衣的下摆轻轻一晃。那人弯下身，用刚划燃的火柴点燃了他的烟。短暂的火光照亮了他们的脸。", {}),
// 36
S("在路灯昏黄的光线下，那一头金发却奇异地散发着微光，像一轮朦胧的艳阳。那双深邃的眼睛泛着蓝紫色的幽光，但给他印象最深的是对方脸上稍纵即逝的阴沉和狠厉——像刀子藏在丝绒里，转瞬即逝，却绝不会是错觉。", {}),
// 37
S("谢了。", {
  speaker: '亚瑟', speakerClass: 'arthur-voice', textClass: 'dialogue'
}),
// 38
S("等一下。", {
  speaker: '亚瑟', speakerClass: 'arthur-voice', textClass: 'dialogue'
}),
